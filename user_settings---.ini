[platformio]
default_envs =
    seeed_xiao_nrf52840-tx
    seeed_xiao_esp32s3-rx

; Windows ARM64 only: the latest PlatformIO packages do not work as of March 5, 2026. Uncomment below to use 6.11.0 instead.
; [seeed_xiao_esp32s3]
; platform = espressif32@6.11.0

[env:seeed_xiao_esp32s3-rx]
upload_port = /dev/cu.usbmodem2011101

[env:seeed_xiao_nrf52840-tx]
upload_port = /dev/cu.usbmodem20114201
