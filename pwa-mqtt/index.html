<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoRa MailBox</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg: #fff;
            --text: #212121;
            --primary: #1976d2;
            --secondary: #f5f5f5;
            --border: #e0e0e0;
            --border_advertize: #ccc;
            --border_width: 1px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #212121;
                --text: #f5f5f5;
                --primary: #64b5f6;
                --secondary: #333;
                --border: #444;
                --border_advertize: #666;
                --border_width: 2px;
            }
        }

        body {
            font-family: system-ui, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            color: var(--text);
            background: var(--bg);
        }

        h1 {
            color: var(--primary);
            text-align: center;
        }

        .counter-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .counter {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            flex: 1;
            margin: 0 5px;
            background: var(--secondary);
            border: var(--border_width) solid var(--border);
        }

        .counter h3 {
            margin-top: 0;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .counter .value {
            font-size: 24px;
            font-weight: bold;
        }

        .status {
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            background: var(--secondary);
            border: var(--border_width) solid var(--border);
        }

        .connected {
            border-color: hsl(150, 65%, 57%);
        }

        .disconnected {
            border-color: hsl(0, 80%, 70%);
        }

        .message {
            border-color: var(--primary);
        }

        #log {
            font-family: monospace;
            font-size: 16px;
            background: var(--secondary);
            border: var(--border_width) solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            overflow-x: auto;
            overflow-y: auto;
            max-height: 40vh;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .notification-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .notification-toggle input[type="checkbox"] {
            margin-right: 8px;
            transform: scale(1.3);
        }

        .advertize {
            border-color: var(--border_advertize);
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0% { border-color: var(--border); }
            50% { border-color: var(--primary); }
            100% { border-color: var(--border); }
        }
    </style>
</head>
<body>
    <h1>• LoRa MailBox •</h1>

    <label class="notification-toggle">
        <input type="checkbox" id="notification-permission">
        Enable Notifications
    </label>

    <div class="counter-panel">
        <div id="heartbeat-counter" class="counter">
            <h3>HEARTBEATS</h3>
            <div class="value">0</div>
        </div>
        <div id="no-heartbeat-counter" class="counter">
            <h3>FLAP OPENED</h3>
            <div class="value">0</div>
        </div>
    </div>

    <div id="connection-status" class="status disconnected">Déconnecté</div>
    <div id="log"></div>

    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
