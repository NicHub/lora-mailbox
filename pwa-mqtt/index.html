<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA MQTT Monitor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <!-- Ajout de la favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .connected {
            background-color: #dff0d8;
        }
        .disconnected {
            background-color: #f2dede;
        }
        .message {
            background-color: #d9edf7;
        }
        .counter-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .counter {
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            flex: 1;
            margin: 0 5px;
        }
        .counter-ok {
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
        }
        .counter-alert {
            background-color: #f2dede;
            border: 1px solid #ebccd1;
        }
        .counter h3 {
            margin-top: 0;
            margin-bottom: 5px;
        }
        .counter .value {
            font-size: 24px;
            font-weight: bold;
        }
        /* Style pour la case à cocher */
        .notification-toggle {
            display: flex;
            align-items: center;
        }
        .notification-toggle input[type="checkbox"] {
            margin-right: 8px;
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Moniteur MQTT</h1>
        <label class="notification-toggle">
            <input type="checkbox" id="notification-permission">
            Notifications
        </label>
    </div>

    <div class="counter-panel">
        <div id="heartbeat-counter" class="counter counter-ok">
            <h3>Avec HEARTBEAT</h3>
            <div class="value">0</div>
        </div>
        <div id="no-heartbeat-counter" class="counter counter-alert">
            <h3>Sans HEARTBEAT</h3>
            <div class="value">0</div>
        </div>
    </div>

    <div id="connection-status" class="status disconnected">Déconnecté</div>
    <div id="log"></div>

    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
