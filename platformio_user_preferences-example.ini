; Rename this file to platformio_user_preferences.ini if you want to set
; attributes that are specific to your setup e.g. the serial ports.

[seeed_xiao_esp32s3-rx]
extends = env:seeed_xiao_esp32s3-rx
upload_port = /dev/cu.usbmodem11101
monitor_port = ${this.upload_port}

[seeed_xiao_esp32s3-tx]
extends = env:seeed_xiao_esp32s3-tx
upload_port = /dev/cu.usbmodem11201
monitor_port = ${this.upload_port}
