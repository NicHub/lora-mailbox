[user_pref-platformio]
default_envs =
    seeed_xiao_nrf52840-tx
    seeed_xiao_esp32s3-rx

[user_pref-env]
build_flags =
    -D DEBUG=true
    -D SENDTO_NTFY=false
    -D SERIAL_VERBOSITY=2
    -D HEARTBEATS_PER_DAY=86400 ; 0..86400 (0 = désactive le heartbeat périodique)
    -DUSBCON           ; Tentative de pallier les déconnections intempestives du port série.
    -DUSE_TINYUSB      ; Tentative de pallier les déconnections intempestives du port série.
    -DCFG_TUSB_DEBUG=0 ; Tentative de pallier les déconnections intempestives du port série.

[user_pref-seeed_xiao_esp32s3-rx]
upload_port = /dev/cu.usbmodem311101
build_flags =

[user_pref-seeed_xiao_esp32s3-tx]
upload_port = /dev/cu.usbmodem311301
build_flags =

[user_pref-seeed_xiao_nrf52840-tx]
upload_port = /dev/cu.usbmodem3114201
build_flags =
