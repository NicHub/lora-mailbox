[platformio]
extra_configs =
    ./platformio_user_preferences.ini
default_envs =
    seeed_xiao_esp32s3-rx
    seeed_xiao_esp32s3-tx
    seeed_xiao_nrf52840-tx

[env]
monitor_speed = 115200
upload_speed = 1000000
framework = arduino
build_flags =
    -D BAUD_RATE=${this.monitor_speed}
    !python get_build_flags.py
lib_deps =
    jgromes/RadioLib@^7.1.2
    bblanchon/ArduinoJson@^7.4.1
monitor_port = ${this.upload_port}

; ============================================================
; ===================== Board Definitions ====================
; ============================================================

[seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
lib_deps =
    ${env.lib_deps}

[env:seeed_xiao_esp32s3-rx]
extends = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    ${user_pref-seeed_xiao_esp32s3-rx.build_flags}
    -D PROJECT_NAME=\"seeed_xiao_esp32s3-rx\"
lib_deps =
    ${seeed_xiao_esp32s3.lib_deps}
    esphome/ESPAsyncWebServer-esphome@^3.3.0
    knolleary/PubSubClient@^2.8
    ; mobizt/ESP Mail Client@^3.4.24
build_src_filter =
    -<*>
    +<main.cpp>
    +<common>
    +<RX_ESP32>
upload_port = ${user_pref-seeed_xiao_esp32s3-rx.upload_port}

[env:seeed_xiao_esp32s3-tx]
extends = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    ${user_pref-seeed_xiao_esp32s3-tx.build_flags}
    -D PROJECT_NAME=\"seeed_xiao_esp32s3-tx\"
lib_deps =
    ${seeed_xiao_esp32s3.lib_deps}
build_src_filter =
    -<*>
    +<main.cpp>
    +<common>
    +<TX_ESP32>
upload_port = ${user_pref-seeed_xiao_esp32s3-tx.upload_port}

; ============================================================
; ===================== Board Definitions ====================
; ============================================================

[seeed_xiao_nrf52840]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
lib_deps =
    ${env.lib_deps}
    https://github.com/adafruit/Adafruit_nRF52_Arduino
upload_protocol = nrfutil
board_build.filesystem = littlefs

[env:seeed_xiao_nrf52840-tx]
extends = seeed_xiao_nrf52840
build_flags =
    ${env.build_flags}
    ${user_pref-seeed_xiao_nrf52840-tx.build_flags}
    -D PROJECT_NAME=\"seeed_xiao_nrf52840-tx\"
lib_deps =
    ${seeed_xiao_nrf52840.lib_deps}
build_src_filter =
    -<*>
    +<main.cpp>
    +<common>
    +<TX_nRF52>
upload_port = ${user_pref-seeed_xiao_nrf52840-tx.upload_port}
