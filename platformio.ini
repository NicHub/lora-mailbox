[platformio]
extra_configs =
    *user_settings.ini

[env]
extra_scripts =
    pre:scripts/build/bootstrap_user_settings.py
    pre:scripts/build/get_build_flags.py
monitor_speed = 115200
upload_speed = 1000000
framework = arduino
build_flags =
    -D BAUD_RATE=${this.monitor_speed}
lib_deps =
    jgromes/RadioLib@^7.1.2
    bblanchon/ArduinoJson@^7.4.1
monitor_port = ${this.upload_port}

; ============================================================
; ===================== Board Definitions ====================
; ============================================================

[seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${env.lib_deps}

[env:seeed_xiao_esp32s3-rx]
extends = seeed_xiao_esp32s3
build_flags =
    ${seeed_xiao_esp32s3.build_flags}
    -D BOARD_TYPE=0
    -D PROJECT_NAME=\"seeed_xiao_esp32s3-rx\"
lib_deps =
    ${seeed_xiao_esp32s3.lib_deps}
    esphome/ESPAsyncWebServer-esphome@^3.4.0
    https://github.com/theelims/PsychicMqttClient.git
build_src_filter =
    -<*>
    +<main.cpp>
    +<common>
    +<RX_ESP32>

; ============================================================
; ===================== Board Definitions ====================
; ============================================================

[seeed_xiao_nrf52840]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
lib_deps =
    ${env.lib_deps}
    https://github.com/adafruit/Adafruit_nRF52_Arduino
upload_protocol = nrfutil

[env:seeed_xiao_nrf52840-tx]
extends = seeed_xiao_nrf52840
build_flags =
    ${env.build_flags}
    -D BOARD_TYPE=1
    -D PROJECT_NAME=\"seeed_xiao_nrf52840-tx\"
lib_deps =
    ${seeed_xiao_nrf52840.lib_deps}
build_src_filter =
    -<*>
    +<main.cpp>
    +<common>
    +<TX_nRF52>
