[platformio]
extra_configs =
    ./platformio_user_preferences.ini
default_envs =
    seeed_xiao_esp32s3-rx
    seeed_xiao_esp32s3-tx

[env]
monitor_speed = 115200
upload_speed = 1000000
framework = arduino
build_flags =
    -D VERSION="0.1"
    -D BAUD_RATE=${env.monitor_speed}
    !python get_build_flags.py
lib_deps =
    jgromes/RadioLib@^7.1.2
    bblanchon/ArduinoJson@^7.4.1

; ============================================================
; ===================== Board Definitions ====================
; ============================================================

[seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    -D LORA_TRANSCEIVER_MODEL=1262 ; Semtech SX1262
lib_deps =
    ${env.lib_deps}

[env:seeed_xiao_esp32s3-rx]
extends = seeed_xiao_esp32s3
build_flags =
    ${env:seeed_xiao_esp32s3.build_flags}
    -D RXorTX=0
    '-D PROJECT_NAME="seeed_xiao_esp32s3-rx"'
lib_deps =
    ${seeed_xiao_esp32s3.lib_deps}
    esphome/ESPAsyncWebServer-esphome@^3.3.0
    knolleary/PubSubClient@^2.8
    ; mobizt/ESP Mail Client@^3.4.24
build_src_filter =
    -<*>
    +<main.cpp>
    +<common>
    +<RX>

[env:seeed_xiao_esp32s3-tx]
extends = seeed_xiao_esp32s3
build_flags =
    ${env:seeed_xiao_esp32s3.build_flags}
    -D RXorTX=1
    '-D PROJECT_NAME="seeed_xiao_esp32s3-tx"'
lib_deps =
    ${seeed_xiao_esp32s3.lib_deps}
build_src_filter =
    -<*>
    +<main.cpp>
    +<common>
    +<TX>
